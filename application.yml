micronaut:
  application:
    name: student-management-system

  server:
    port: 8080

  security:
    enabled: true
    authentication: bearer
    intercept-url-map:
      - pattern: /swagger-ui/**
        access:
          - isAnonymous()
      - pattern: /swagger/**
        access:
          - isAnonymous()
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: "pleaseChangeThisSecretForANewOne_mustBe256bits"
              jws-algorithm: HS256
        generator:
          expiration: 3600

  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**

datasources:
  default:
    url: jdbc:postgresql://localhost:5432/student_management
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    db-type: postgres
    schema-generate: none
    dialect: POSTGRES

jpa:
  default:
    entity-scan:
      packages: 'com.studentmanagement.model'
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect