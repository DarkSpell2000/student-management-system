# Конфигурация для тестов: используем H2 in-memory БД,
# чтобы тесты не зависели от наличия PostgreSQL.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: testSecretKeyForUnitTestsItMustBe256BitsLongForHS256AlgorithmTest
    expiration-ms: 3600000

logging:
  level:
    com.studentmanagement: WARN
    org.springframework: WARN
    org.hibernate: WARN
