# Конфигурация для тестов: используем H2 in-memory БД,
# чтобы тесты не зависели от наличия PostgreSQL.
spring:
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/student_management}
    username: ${JDBC_USER:postgres}
    password: ${JDBC_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: testSecretKeyForUnitTestsItMustBe256BitsLongForHS256AlgorithmTest
    expiration-ms: 3600000

logging:
  level:
    com.studentmanagement: WARN
    org.springframework: WARN
    org.hibernate: WARN
